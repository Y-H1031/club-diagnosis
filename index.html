<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラブ診断</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  <h1>✨ ぴったりクラブ診断 ✨</h1>
  
  <div class="form-group">
    <p class="section-title">希望するタイプ</p>
    <div class="type-button-container">
      <button class="type-btn btn-all active" onclick="setType('all', this)">希望なし（すべてから探す）</button>
      <button class="type-btn btn-sub" onclick="setType('sports', this)">運動部</button>
      <button class="type-btn btn-sub" onclick="setType('culture', this)">文化部</button>
      <button class="type-btn btn-sub" onclick="setType('volunteer', this)">ボランティア</button>
    </div>
  </div>

  <div class="priority-section">
    <p class="priority-title">⭐ 特に重視する要素（2つ選択）</p>
    <small style="color: #A1A1AA; display: block; margin-bottom: 15px;">選んだ項目のマッチ度がスコアに大きく影響します。</small>
    <div class="priority-grid">
      <label><input type="checkbox" class="priority-chk" value="0"> 男女比</label>
      <label><input type="checkbox" class="priority-chk" value="1"> 活動場所</label>
      <label><input type="checkbox" class="priority-chk" value="2"> 活動頻度</label>
      <label><input type="checkbox" class="priority-chk" value="3"> 雰囲気</label>
      <label><input type="checkbox" class="priority-chk" value="4"> 人間関係</label>
      <label><input type="checkbox" class="priority-chk" value="5"> 費用</label>
    </div>
  </div>

  <div id="questionsArea">
    <div class="form-group">
      <label>① 希望の男女比</label>
      <select id="q_gender">
        <option value="1">ほぼ男子のみ</option>
        <option value="2">男子多め</option>
        <option value="3">男女同じぐらい</option>
        <option value="4">女子多め</option>
        <option value="5">ほぼ女子のみ</option>
      </select>
    </div>
    <div class="form-group">
      <label>② 希望の活動場所</label>
      <select id="q_place">
        <option value="1">武蔵野キャンパスのみ</option>
        <option value="2">武蔵野キャンパス多めがいい</option>
        <option value="3">場所にはこだわらない（両キャンパス・外部の施設・オンライン等）</option>
        <option value="4">有明キャンパス多めがいい</option>
        <option value="5">有明キャンパスのみ</option>
      </select>
    </div>
    <div class="form-group">
      <label>③ 希望の活動頻度</label>
      <select id="q_freq">
        <option value="1">週1回未満</option>
        <option value="2">週1回</option>
        <option value="3">週2回</option>
        <option value="4">週3回</option>
        <option value="5">週4回以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>④ 希望の雰囲気</label>
      <select id="q_atmos">
        <option value="1">初心者メインでゆったり</option>
        <option value="2">ややゆったり</option>
        <option value="3" selected>標準・普通</option>
        <option value="4">ややしっかり活動</option>
        <option value="5">経験者メインでしっかり</option>
      </select>
    </div>
    <div class="form-group">
      <label>⑤ 人間関係・雰囲気</label>
      <select id="q_rel">
        <option value="1">上下関係なし・完全にフラット</option>
        <option value="2">ややフランク</option>
        <option value="3" selected>標準・普通</option>
        <option value="4">やや体育会系</option>
        <option value="5">体育会系</option>
      </select>
    </div>
    <div class="form-group">
      <label>⑥ 1年あたりの費用</label>
      <select id="q_cost">
        <option value="1">無料</option>
        <option value="2">1,000円未満</option>
        <option value="3">5,000円未満</option>
        <option value="4">10,000円未満</option>
        <option value="5">10,000円以上</option>
      </select>
    </div>
  </div>

  <button class="main" id="submitBtn" onclick="calculate()">診断する 🚀</button>

  <div id="result"></div>
</div>
  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
