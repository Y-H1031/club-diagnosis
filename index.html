<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラブ診断</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>クラブ診断</h1>
  
  <div class="card">
    <p>希望するタイプ</p>
    <div class="btn-group">
      <button class="type-btn active" onclick="setType('all', this)">希望なし</button>
      <button class="type-btn" onclick="setType('sports', this)">運動部</button>
      <button class="type-btn" onclick="setType('culture', this)">文化部</button>
      <button class="type-btn" onclick="setType('volunteer', this)">ボランティア</button>
    </div>
  </div>

  <div class="card">
    <p>特に重視する要素（2つ選択）</p>
    <small style="color: #666;">選んだ項目のマッチ度がスコアに大きく影響します。</small>
    <div class="priority-grid">
      <label><input type="checkbox" class="priority-chk" value="0"> 活動場所</label>
      <label><input type="checkbox" class="priority-chk" value="1"> 男女比</label>
      <label><input type="checkbox" class="priority-chk" value="2"> 活動頻度</label>
      <label><input type="checkbox" class="priority-chk" value="3"> 雰囲気</label>
      <label><input type="checkbox" class="priority-chk" value="4"> 人間関係</label>
      <label><input type="checkbox" class="priority-chk" value="5"> 費用</label>
    </div>
  </div>

  <div id="questionsArea">
    <div class="card">
      <p>① 希望の活動場所</p>
      <select id="q_place">
        <option value="1">武蔵野キャンパス</option>
        <option value="2">有明キャンパス</option>
        <option value="3">外部の施設でも可</option>
      </select>
    </div>
    <div class="card">
      <p>② 希望の男女比</p>
      <select id="q_gender">
        <option value="1">男子多め</option>
        <option value="2">半々</option>
        <option value="3">女子多め</option>
      </select>
    </div>
    <div class="card">
      <p>③ 希望の活動頻度</p>
      <select id="q_freq">
        <option value="1">週1回未満</option>
        <option value="2">週1回</option>
        <option value="3">週2回</option>
        <option value="4">週3回</option>
        <option value="5">週4回以上</option>
      </select>
    </div>
    <div class="card">
      <p>④ 希望の雰囲気：<span id="q_atmosVal">3</span></p>
      <small style="color:#666;">1:初心者・ゆったり 〜 5:しっかり活動</small>
      <input type="range" id="q_atmos" min="1" max="5" value="3">
    </div>
    <div class="card">
      <p>⑤ 人間関係・雰囲気：<span id="q_relVal">3</span></p>
      <small style="color:#666;">1:ゆったり・上下関係なし 〜 5:体育会系</small>
      <input type="range" id="q_rel" min="1" max="5" value="3">
    </div>
    <div class="card">
      <p>⑥ 1年あたりの費用</p>
      <select id="q_cost">
        <option value="1">無料</option>
        <option value="2">1,000円未満</option>
        <option value="3">5,000円未満</option>
        <option value="4">10,000円未満</option>
        <option value="5">10,000円以上</option>
      </select>
    </div>
  </div>

  <button class="main" id="submitBtn" onclick="calculate()">診断する</button>

  <div id="result"></div>
  
  <div class="card" id="chartContainer" style="display: none; margin-top: 15px;">
    <canvas id="matchChart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>

</body>
</html>
